<footer class="site-footer">
  <div class="footer-inner">
    {% if site.footer_text %}
      <p class="footer-text">{{ site.footer_text }}</p>
    {% else %}
      <p class="footer-text">{{ site.title }} &mdash; {{ site.description }}</p>
    {% endif %}
    <p class="footer-copy">&copy; {{ site.time | date: "%Y" }} {{ site.author | default: site.title }}. All rights reserved.</p>
  </div>
</footer>
